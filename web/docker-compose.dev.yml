services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailkit
      POSTGRES_PASSWORD: mailkit
      POSTGRES_DB: mailkit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  mailpit:
    # Dev SMTP capture (replaces Postal in dev). Open http://localhost:8025
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
